<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#f6f3ea" />
  <title>技术边界数据库</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-frame">
    <aside class="sidebar">
      <div class="brand-lockup">
        <div class="mark">边</div>
        <div>
          <h1>技术边界数据库</h1>
          <p>每日情报、文献与行业知识库</p>
        </div>
      </div>

      <nav class="mode-nav" aria-label="主要视图">
        <button class="mode-button active" data-view="desk">情报工作台</button>
        <button class="mode-button" data-view="knowledge">知识库文档</button>
        <button class="mode-button" data-view="radar">预警雷达</button>
        <button class="mode-button" data-view="pipeline">数据流水线</button>
      </nav>

      <section class="side-section">
        <div class="side-title">行业索引</div>
        <div id="categoryTree" class="category-tree"></div>
      </section>
    </aside>

    <main class="workspace">
      <header class="command-bar">
        <div>
          <div class="caption">Technology Frontier Intelligence</div>
          <h2 id="viewTitle">情报工作台</h2>
        </div>
        <label class="search-box">
          <span>搜索</span>
          <input id="searchInput" placeholder="标题、正文、分类、来源、URL" />
        </label>
      </header>

      <section id="summaryStrip" class="summary-strip"></section>

      <section class="view active" data-panel="desk">
        <div class="desk-grid">
          <section class="panel feed-panel">
            <div class="panel-head">
              <div>
                <h3>情报流</h3>
                <p id="feedCount">载入中</p>
              </div>
              <div class="segmented">
                <button class="active" data-filter="all">全部</button>
                <button data-filter="news">新闻</button>
                <button data-filter="literature">文献</button>
                <button data-filter="alerts">预警</button>
              </div>
            </div>
            <div id="feed" class="feed"></div>
          </section>

          <aside class="panel inspect-panel">
            <div class="panel-head compact">
              <div>
                <h3>证据详情</h3>
                <p>先看摘要，再看参数与原文</p>
              </div>
            </div>
            <div id="inspector" class="inspector"></div>
          </aside>
        </div>
      </section>

      <section class="view" data-panel="knowledge">
        <div class="knowledge-layout">
          <section class="panel knowledge-list-panel">
            <div class="panel-head">
              <div>
                <h3>知识库文档</h3>
                <p id="knowledgeCount">按叶子行业聚合</p>
              </div>
            </div>
            <div id="knowledgeList" class="knowledge-list"></div>
          </section>
          <aside class="panel knowledge-detail-panel">
            <div id="knowledgeDetail" class="knowledge-detail"></div>
          </aside>
        </div>
      </section>

      <section class="view" data-panel="radar">
        <div class="panel radar-panel">
          <div class="panel-head">
            <div>
              <h3>预警雷达</h3>
              <p>按预警情报和关键参数集中审查</p>
            </div>
          </div>
          <div id="radarList" class="radar-list"></div>
        </div>
      </section>

      <section class="view" data-panel="pipeline">
        <div class="panel pipeline-panel">
          <div class="panel-head">
            <div>
              <h3>数据流水线</h3>
              <p>来源、版本、缓存与分类任务状态</p>
            </div>
          </div>
          <div id="pipeline" class="pipeline"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>

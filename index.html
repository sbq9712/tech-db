<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0b1020" />
  <title>技术边界数据库</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg"></div>
  <div class="page-shell">
    <header class="topbar card">
      <div class="brand-inline">
        <div class="brand-mark">T</div>
        <div>
          <h1>技术边界数据库</h1>
          <p>结构化情报 · 预警 · 行业知识库</p>
        </div>
      </div>
      <div class="topbar-actions">
        <input id="search" placeholder="搜索标题、分类、来源、关键词" />
      </div>
    </header>

    <section class="hero-grid">
      <article class="card hero-panel">
        <div class="eyebrow">总览</div>
        <h2>围绕技术边界的情报筛选与证据查看</h2>
        <p>这个页面被拆成六个明确功能块：总览、分类、列表、详情、知识库、批处理任务。每块只承担一种职责，避免不同密度的信息互相抢空间。</p>
      </article>
      <article class="card metric-panel" id="stats"></article>
      <article class="card metric-panel" id="meta"></article>
    </section>

    <section class="main-grid">
      <aside class="card rail-panel">
        <div class="section-head">
          <h3>分类索引</h3>
          <span>按行业浏览</span>
        </div>
        <div id="nav" class="nav"></div>
      </aside>

      <section class="card list-panel">
        <div class="section-head">
          <h3>最新情报</h3>
          <span id="count"></span>
        </div>
        <div class="toolbar">
          <button data-filter="all" class="active">全部</button>
          <button data-filter="news">新闻</button>
          <button data-filter="literature">文献</button>
          <button data-filter="alerts">预警</button>
        </div>
        <div id="list" class="list"></div>
      </section>

      <aside class="card detail-panel">
        <div class="section-head sticky-head">
          <h3>情报详情</h3>
          <span>摘要优先 · 长文按需</span>
        </div>
        <div id="detail" class="detail"></div>
      </aside>
    </section>

    <section class="card knowledge-panel">
      <div class="section-head">
        <h3>行业知识库</h3>
        <span>叶子行业自动生成</span>
      </div>
      <div id="knowledge" class="knowledge"></div>
    </section>

    <section class="card job-panel">
      <div class="section-head">
        <h3>批处理任务</h3>
        <span>38,121 条未分类</span>
      </div>
      <div id="jobs" class="jobs"></div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0e17" />
  <title>技术边界数据库</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="control-rail" aria-label="筛选控制台">
      <div class="brand-block">
        <div class="brand-mark">TB</div>
        <div>
          <h1>技术边界数据库</h1>
          <p>Frontier Intelligence Console</p>
        </div>
      </div>

      <div id="stats" class="rail-stats" aria-label="数据统计"></div>

      <section class="rail-section">
        <label class="search-wrap">
          <span>全库检索</span>
          <input id="searchInput" placeholder="标题、正文、分类、来源、URL" autocomplete="off" />
        </label>
      </section>

      <section class="rail-section popover-control">
        <button id="dateButton" class="filter-button" type="button" aria-haspopup="dialog">
          <span>日期</span><strong id="dateLabel">全部日期</strong>
        </button>
        <div id="datePopover" class="popover calendar-popover">
          <div class="calendar-head">
            <button id="prevMonth" type="button">‹</button>
            <strong id="calendarTitle"></strong>
            <button id="nextMonth" type="button">›</button>
          </div>
          <div class="calendar-weekdays">
            <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
          <button id="clearDate" class="clear-button" type="button">清除日期筛选</button>
        </div>
      </section>

      <section class="rail-section popover-control">
        <button id="categoryButton" class="filter-button" type="button" aria-haspopup="dialog">
          <span>分类</span><strong id="categoryLabel">全部分类</strong>
        </button>
        <div id="categoryPopover" class="popover category-popover">
          <input id="categorySearch" class="category-search" placeholder="搜索分类项" autocomplete="off" />
          <div id="categoryList" class="category-list"></div>
          <button id="clearCategory" class="clear-button" type="button">清除分类筛选</button>
        </div>
      </section>

      <section class="rail-section">
        <div class="section-label">情报类型</div>
        <div class="segmented vertical" id="typeFilter">
          <button class="active" data-type="all" type="button">全部</button>
          <button data-type="news" type="button">新闻</button>
          <button data-type="literature" type="button">文献</button>
        </div>
      </section>

      <section class="rail-section">
        <div class="section-label">是否预警</div>
        <div class="segmented vertical" id="alertFilter">
          <button class="active" data-alert="all" type="button">全部</button>
          <button data-alert="yes" type="button">预警</button>
          <button data-alert="no" type="button">非预警</button>
        </div>
      </section>
    </aside>

    <main class="content-pane">
      <header class="content-head">
        <div>
          <div class="eyebrow">TECHNOLOGY FRONTIER DATABASE</div>
          <h2>新闻 / 文献情报流</h2>
          <p id="resultMeta">载入中</p>
        </div>
        <div class="page-controls">
          <button id="prevPage" type="button">上一页</button>
          <span id="pageLabel"></span>
          <button id="nextPage" type="button">下一页</button>
        </div>
      </header>
      <div id="activeFilters" class="active-filters" aria-label="当前筛选条件"></div>
      <section id="recordList" class="record-list" aria-live="polite">
        <div class="loading-card">正在载入情报数据...</div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>

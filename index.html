<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#08111f" />
  <title>技术边界数据库</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg"></div>
  <div class="app-shell">
    <aside class="left-rail card">
      <div class="brand">
        <div class="brand-mark">T</div>
        <div>
          <h1>技术边界数据库</h1>
          <p>结构化情报 · 预警 · 行业知识库</p>
        </div>
      </div>
      <div id="meta" class="meta"></div>
      <input id="search" placeholder="搜索标题、分类、来源、关键词" />
      <div class="section-title">分类索引</div>
      <div id="nav" class="nav"></div>
    </aside>

    <main class="center-pane">
      <header class="hero card">
        <div>
          <div class="eyebrow">静态情报库 · GitHub Pages</div>
          <h2>围绕技术边界的情报筛选与证据查看</h2>
          <p>让列表负责扫描，让详情负责证据。默认只展示摘要和关键参数，长正文按需展开。</p>
        </div>
        <div id="stats" class="stats-grid"></div>
      </header>

      <section class="toolbar card">
        <button data-filter="all" class="active">全部</button>
        <button data-filter="news">新闻</button>
        <button data-filter="literature">文献</button>
        <button data-filter="alerts">预警</button>
      </section>

      <section class="list-card card">
        <div class="panel-head">
          <h3>最新情报</h3>
          <span id="count"></span>
        </div>
        <div id="list" class="list"></div>
      </section>
    </main>

    <aside class="right-rail card">
      <div class="panel-head sticky-head">
        <h3>情报详情</h3>
        <span>摘要优先 · 长文按需</span>
      </div>
      <div id="detail" class="detail"></div>
    </aside>
  </div>
  <section class="knowledge-band card">
    <div class="panel-head">
      <h3>行业知识库</h3>
      <span>按叶子行业自动生成</span>
    </div>
    <div id="knowledge" class="knowledge"></div>
  </section>
  <script src="app.js"></script>
</body>
</html>

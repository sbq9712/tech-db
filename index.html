<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>技术边界数据库</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-mark">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div class="header-titles">
        <h1>技术边界数据库</h1>
        <p>Technology Frontier Intelligence</p>
      </div>
      <div class="header-meta" id="headerMeta"></div>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="search-bar">
        <input id="searchInput" type="text" placeholder="检索标题、正文、分类…" autocomplete="off" />
      </div>

      <div class="filter-block">
        <div class="filter-head">
          <span class="filter-title">日期</span>
          <button class="filter-clear" id="clearDateBtn" type="button" style="display:none">清除</button>
        </div>
        <div class="date-range">
          <label class="date-field">
            <span>从</span>
            <input type="date" id="dateFrom" />
          </label>
          <span class="date-sep">→</span>
          <label class="date-field">
            <span>至</span>
            <input type="date" id="dateTo" />
          </label>
        </div>
        <div class="date-quick">
          <button data-quick="today" type="button">今天</button>
          <button data-quick="7d" type="button">近7天</button>
          <button data-quick="30d" type="button">近30天</button>
          <button data-quick="all" type="button">全部</button>
        </div>
      </div>

      <div class="filter-block">
        <div class="filter-head">
          <span class="filter-title">分类</span>
          <button class="filter-clear" id="clearCategoryBtn" type="button" style="display:none">清除</button>
        </div>
        <input id="categorySearch" class="category-filter-input" type="text" placeholder="筛选分类…" autocomplete="off" />
        <div class="category-tree" id="categoryTree"></div>
      </div>

      <div class="filter-block">
        <div class="filter-head"><span class="filter-title">类型</span></div>
        <div class="segmented" id="typeFilter">
          <button class="active" data-type="all" type="button">全部</button>
          <button data-type="news" type="button">新闻</button>
          <button data-type="literature" type="button">文献</button>
        </div>
      </div>

      <div class="filter-block">
        <div class="filter-head"><span class="filter-title">预警</span></div>
        <div class="segmented" id="alertFilter">
          <button class="active" data-alert="all" type="button">全部</button>
          <button data-alert="yes" type="button">预警</button>
          <button data-alert="no" type="button">非预警</button>
        </div>
      </div>
    </aside>

    <main class="content">
      <div class="content-toolbar">
        <div class="result-info"><span id="resultCount"></span></div>
      </div>
      <div class="active-chips" id="activeChips"></div>
      <section id="recordList" class="record-list">
        <div class="loading-hint">正在载入情报数据…</div>
      </section>
      <div class="pagination">
        <button id="prevPage" type="button">‹ 上一页</button>
        <span id="pageLabel"></span>
        <button id="nextPage" type="button">下一页 ›</button>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>

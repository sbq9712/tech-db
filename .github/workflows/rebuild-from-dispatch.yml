name: 源仓库更新触发重建
on:
  repository_dispatch:
    types: [source-updated]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 scripts/build_database.py --output data
      - uses: actions/upload-artifact@v4
        with:
          name: tech-db-data-dispatch
          path: data

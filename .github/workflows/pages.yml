name: 更新数据
on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
  schedule:
    - cron: '17 1 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [source-updated]
permissions:
  contents: write
concurrency:
  group: update-data
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 scripts/build_database.py --output data
      - run: python3 scripts/build_classification_jobs.py --limit 38121
      - name: 写回数据文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if ! git diff --cached --quiet; then
            git commit -m "chore: update generated data"
            git push
          fi
